# Railway deployment config for Laravel backend
# Set "Root Directory" to "Backend" in your Railway project settings.

[build]
buildCommand = "test -f .env || cp .env.example .env; composer install --no-dev --optimize-autoloader; chmod +x start.sh"

[deploy]
startCommand = "./start.sh"
healthcheckPath = "/up"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
